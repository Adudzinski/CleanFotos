# CleanFotos — Codemagic CI/CD
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter/
#
# Before the first build, complete the one-time Apple + Codemagic setup
# described in the chat / RELEASE notes:
#   1. App Store Connect API key → Codemagic Team integrations → Developer Portal
#   2. Register bundle ID com.crocodata.cleanpics (or let Codemagic create it)
#   3. Create the app in App Store Connect
#   4. Set APP_STORE_APPLE_ID below (numeric App ID from App Store Connect)

workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    # Reuse the SAME App Store Connect API key as Askra — it's account-wide and
    # works for every app on the account. Name must match Codemagic exactly:
    # Team → Integrations → App Store Connect.
    integrations:
      app_store_connect: askra-asc-key

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # Add APP_STORE_APPLE_ID in the Codemagic UI under a group named "appstore"
      # (App Store Connect → your app → App Information → Apple ID, the number).
      # It's optional — without it the build number falls back to pubspec.
      groups:
        - appstore
      # Automatic signing — Codemagic creates/manages the certificate and
      # provisioning profile via the API key above (App Manager role is enough).
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.crocodata.cleanpics

    scripts:
      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter build IPA
        script: |
          # Auto-bump CFBundleVersion from the latest TestFlight build when
          # APP_STORE_APPLE_ID is set; otherwise use the pubspec build number.
          BUILD_NUMBER="$(
            if [ -n "${APP_STORE_APPLE_ID:-}" ]; then
              LATEST="$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"
              if [ -n "$LATEST" ] && [ "$LATEST" != "0" ]; then
                echo $((LATEST + 1))
              else
                echo "${PROJECT_BUILD_NUMBER:-$(grep '^version:' pubspec.yaml | sed 's/.*+//')}"
              fi
            else
              echo "${PROJECT_BUILD_NUMBER:-$(grep '^version:' pubspec.yaml | sed 's/.*+//')}"
            fi
          )"
          BUILD_NAME="$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')"
          echo "Building $BUILD_NAME ($BUILD_NUMBER)"
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - contact@crocodata.net
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        # Upload the build to TestFlight (processes for internal testers with
        # no review needed).
        submit_to_testflight: true
        # To also push it to EXTERNAL testers — which triggers Apple's Beta App
        # Review — uncomment and set your external group name exactly as it
        # appears in App Store Connect → TestFlight → your app.
        # beta_groups:
        #   - External Testers
        # Turn on full App Store submission only after screenshots, privacy
        # answers, and the IAP are ready in App Store Connect.
        # submit_to_app_store: true

  # Optional: compile-only check (no Apple credentials required).
  ios-unsigned:
    name: iOS unsigned smoke build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build iOS without code signing
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/**/*.app
      - /tmp/xcodebuild_logs/*.log
