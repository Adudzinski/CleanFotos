name: cleanfotos_app
description: CleanFotos - Smart photo cleanup app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Photo access
  photo_manager: ^3.3.0
  # AssetEntityImage widget (split out of photo_manager in v3)
  photo_manager_image_provider: ^2.0.0

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # Celebration animation
  confetti: ^0.7.0

  # Ads monetization
  google_mobile_ads: ^9.0.0

  # Image decoding for perceptual hashing (similarity filter)
  image: ^4.2.0

  # Utilities
  intl: 0.20.2
  crypto: ^3.0.3
  path_provider: ^2.1.4
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
