name: cleanfotos_app
description: CleanPics - Smart photo cleanup app
publish_to: 'none'
version: 1.0.7+8

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Photo access
  photo_manager: ^3.3.0
  # AssetEntityImage widget (split out of photo_manager in v3)
  photo_manager_image_provider: ^2.0.0

  # State management
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.3.2

  # Celebration animation
  confetti: ^0.7.0

  # Ads monetization
  google_mobile_ads: ^9.0.0

  # One-time "Pro" in-app purchase (remove ads)
  in_app_purchase: ^3.2.0

  # Monthly local reminder notifications
  flutter_local_notifications: ^17.2.4
  flutter_timezone: ^3.0.1
  timezone: ^0.9.4

  # Open the privacy policy / website in the browser
  url_launcher: ^6.3.0

  # Video preview in the video-cleanup swipe deck
  video_player: ^2.9.1

  # Explicit runtime permission requests (video access on Android 13+)
  permission_handler: ^11.3.1

  # Image decoding for perceptual hashing (similarity filter)
  image: ^4.2.0

  # Utilities
  intl: 0.20.2
  crypto: ^3.0.3
  path_provider: ^2.1.4
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon_legacy.png
    - assets/icon/icon_header.png
    - assets/icon/cleanapps_icon.png

# Launch/splash screen — run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#EFEEFC"
  image: assets/icon/splash_logo.png
  android_12:
    image: assets/icon/splash_a12.png
    icon_background_color: "#EFEEFC"
  android: true
  ios: false
  web: false

# App icon generation — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon_legacy.png"
  adaptive_icon_background: "#EFEEFC"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 23
